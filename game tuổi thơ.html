<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Tâm FF</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 30px;
        }
        h1 { color: #ff6600; }
        .btn {
            background: #ff6600;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            margin: 10px;
            cursor: pointer;
        }
        .btn.on { background: #00cc00; }
    </style>
</head>
<body>
    <h1>🎯 FIX TÂM FF</h1>
    <p>Fix Lố Tâm & Nhẹ Tâm</p>
    
    <button class="btn" id="btn1" onclick="toggle(this)">🔧 Fix Lố Tâm: ON</button>
    <button class="btn" id="btn2" onclick="toggle(this)">🔧 Fix Nhẹ Tâm: ON</button>
    <br>
    <button class="btn" id="start" onclick="startFix()" style="background:#ff0000;margin-top:20px;">▶ START</button>
    
    <p id="status" style="margin-top:20px;color:#aaa;">Chưa kích hoạt</p>

    <script>
        let fix1 = true, fix2 = true, running = false;
        
        function toggle(btn) {
            btn.classList.toggle('on');
            if (btn.id === 'btn1') fix1 = !fix1;
            else fix2 = !fix2;
        }
        
        function startFix() {
            running = !running;
            const btn = document.getElementById('start');
            const status = document.getElementById('status');
            
            if (running) {
                btn.textContent = '⏹ STOP';
                btn.style.background = '#00cc00';
                status.textContent = 'ĐANG CHẠY - Fix Lố: ' + (fix1?'ON':'OFF') + ' | Fix Nhẹ: ' + (fix2?'ON':'OFF');
                status.style.color = '#00ff00';
            } else {
                btn.textContent = '▶ START';
                btn.style.background = '#ff0000';
                status.textContent = 'Đã dừng';
                status.style.color = '#aaa';
            }
        }
    </script>
</body>
</html>
