<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐍 Rắn Săn Mồi - Tuổi Thơ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a2a32;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
        }
        .game-container {
            background: #0f1920;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
        }
        h1 {
            color: #7bed9f;
            font-size: 28px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #2ed573;
            margin-bottom: 10px;
        }
        canvas {
            background: #1e2f3a;
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            border: 4px solid #2ed573;
            box-shadow: inset 0 0 20px #0a1217;
        }
        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            color: #a4c3d0;
            font-size: 20px;
            font-weight: bold;
        }
        .score {
            background: #16252e;
            padding: 8px 20px;
            border-radius: 30px;
            border: 2px solid #2ed573;
            color: #7bed9f;
        }
        button {
            background: #2ed573;
            border: none;
            color: #0f1920;
            font-weight: bold;
            font-size: 18px;
            padding: 8px 24px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px #2ed57388;
            transition: 0.2s;
            font-family: inherit;
        }
        button:hover {
            transform: scale(1.05);
            background: #7bed9f;
            box-shadow: 0 0 25px #7bed9f;
        }
        .hint {
            color: #7a9aa8;
            margin-top: 10px;
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🐍 RẮN SĂN MỒI</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="info">
        <span class="score">🍎 <span id="scoreDisplay">0</span></span>
        <button id="restartBtn">🔄 Chơi lại</button>
    </div>
    <div class="hint">⬆ ⬇ ⬅ ➡  hoặc WASD</div>
</div>

<script>
    (function() {
        // ----- CẤU HÌNH -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');

        const BOARD_SIZE = 20;          // 20x20 ô
        const CELL_SIZE = canvas.width / BOARD_SIZE;

        // Biến trạng thái
        let snake = [];                // mảng các {x, y}
        let food = { x: 8, y: 8 };
        let direction = 'right';       // hướng hiện tại
        let nextDirection = 'right';   // hướng sẽ áp dụng ở frame tiếp theo
        let score = 0;
        let gameOver = false;
        let win = false;
        let gameInterval = null;
        let gameRunning = false;
        const MOVE_INTERVAL_MS = 150;   // tốc độ di chuyển

        // ----- KHỞI TẠO BAN ĐẦU -----
        function initGame() {
            // Rắn dài 4 ô, nằm ngang
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 },
                { x: 7, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameOver = false;
            win = false;
            updateScore();
            spawnFood(); // đặt mồi ngẫu nhiên
        }

        // ----- SINH MỒI (không trúng rắn) -----
        function spawnFood() {
            const totalCells = BOARD_SIZE * BOARD_SIZE;
            if (snake.length >= totalCells) {
                // Nếu rắn chiếm hết bảng => thắng cuộc
                win = true;
                gameOver = true;
                clearInterval(gameInterval);
                gameRunning = false;
                drawBoard();
                return;
            }

            // Tạo tập hợp các ô rắn đang chiếm
            const snakeSet = new Set(snake.map(cell => `${cell.x},${cell.y}`));
            const freeCells = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (!snakeSet.has(`${i},${j}`)) {
                        freeCells.push({ x: i, y: j });
                    }
                }
            }
            if (freeCells.length === 0) {
                win = true;
                gameOver = true;
                clearInterval(gameInterval);
                gameRunning = false;
                drawBoard();
                return;
            }
            const randIndex = Math.floor(Math.random() * freeCells.length);
            food = freeCells[randIndex];
        }

        // ----- CẬP NHẬT ĐIỂM HIỂN THỊ -----
        function updateScore() {
            scoreSpan.textContent = score;
        }

        // ----- VẼ BẢNG -----
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Vẽ lưới nhẹ (cho đẹp)
            ctx.strokeStyle = '#2a4050';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= BOARD_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // Vẽ rắn
            snake.forEach((segment, index) => {
                const x = segment.x * CELL_SIZE;
                const y = segment.y * CELL_SIZE;
                // Đầu rắn màu sáng hơn
                if (index === 0) {
                    ctx.fillStyle = '#7bed9f';
                    ctx.shadowColor = '#7bed9f';
                    ctx.shadowBlur = 12;
                } else {
                    ctx.fillStyle = '#2ed573';
                    ctx.shadowColor = '#2ed573';
                    ctx.shadowBlur = 6;
                }
                ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                // Vẽ mắt cho đầu (thêm sinh động)
                if (index === 0) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#0f1920';
                    const eyeSize = 3;
                    if (direction === 'right' || direction === 'left') {
                        ctx.beginPath();
                        ctx.arc(x + (direction === 'right' ? 12 : 6), y + 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + (direction === 'right' ? 12 : 6), y + 14, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(x + 6, y + (direction === 'down' ? 12 : 6), eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + 14, y + (direction === 'down' ? 12 : 6), eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });

            // Vẽ mồi (quả táo)
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 18;
            ctx.fillStyle = '#ff4757';
            const fx = food.x * CELL_SIZE;
            const fy = food.y * CELL_SIZE;
            ctx.beginPath();
            ctx.arc(fx + CELL_SIZE/2, fy + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            // Cuống táo
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#2ed573';
            ctx.fillRect(fx + CELL_SIZE/2 - 1, fy + 2, 3, 5);

            // Reset shadow
            ctx.shadowBlur = 0;

            // Nếu game over hoặc thắng, hiển thị thông báo
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 32px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                if (win) {
                    ctx.fillStyle = '#f9ca24';
                    ctx.shadowColor = '#f9ca24';
                    ctx.shadowBlur = 30;
                    ctx.fillText('🏆 BẠN THẮNG!', canvas.width/2, canvas.height/2 - 20);
                } else {
                    ctx.fillStyle = '#ff6b6b';
                    ctx.shadowColor = '#ff6b6b';
                    ctx.shadowBlur = 30;
                    ctx.fillText('💀 GAME OVER', canvas.width/2, canvas.height/2 - 20);
                }
                ctx.shadowBlur = 0;
                ctx.font = '18px "Courier New", monospace';
                ctx.fillStyle = '#a4c3d0';
                ctx.fillText('Nhấn "Chơi lại"', canvas.width/2, canvas.height/2 + 30);
            }
        }

        // ----- DI CHUYỂN RẮN (1 bước) -----
        function moveSnake() {
            if (gameOver || !gameRunning) return;

            // Cập nhật hướng từ nextDirection (chặn quay đầu)
            const opposite = {
                'up': 'down', 'down': 'up', 'left': 'right', 'right': 'left'
            };
            if (nextDirection && opposite[nextDirection] !== direction) {
                direction = nextDirection;
            }

            // Tính đầu mới
            const head = snake[0];
            let newHead = { ...head };
            switch (direction) {
                case 'right': newHead.x++; break;
                case 'left':  newHead.x--; break;
                case 'down':  newHead.y++; break;
                case 'up':    newHead.y--; break;
            }

            // Kiểm tra có ăn mồi không?
            const isEating = (newHead.x === food.x && newHead.y === food.y);

            // Tạo rắn mới
            let newSnake = [newHead, ...snake];

            if (!isEating) {
                newSnake.pop(); // bỏ đuôi nếu không ăn
            }

            // ----- KIỂM TRA VA CHẠM -----
            const headCollision =
                newHead.x < 0 || newHead.x >= BOARD_SIZE || newHead.y < 0 || newHead.y >= BOARD_SIZE ||
                newSnake.slice(1).some(segment => segment.x === newHead.x && segment.y === newHead.y);

            if (headCollision) {
                gameOver = true;
                clearInterval(gameInterval);
                gameRunning = false;
                drawBoard();
                return;
            }

            // Cập nhật rắn
            snake = newSnake;

            // Xử lý ăn mồi
            if (isEating) {
                score++;
                updateScore();
                spawnFood(); // sinh mồi mới (có thể kích hoạt win nếu hết ô)
                if (win) {
                    gameOver = true;
                    clearInterval(gameInterval);
                    gameRunning = false;
                    drawBoard();
                    return;
                }
            }

            // Vẽ lại bảng
            drawBoard();
        }

        // ----- BẮT ĐẦU / DỪNG GAME -----
        function startGameLoop() {
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
            gameRunning = true;
            gameInterval = setInterval(moveSnake, MOVE_INTERVAL_MS);
        }

        // ----- RESET GAME -----
        function resetGame() {
            // Dừng loop cũ
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
            gameRunning = false;
            // Khởi tạo lại dữ liệu
            initGame();
            drawBoard();
            // Chạy loop mới
            startGameLoop();
        }

        // ----- XỬ LÝ PHÍM BẤM -----
        function handleKeydown(e) {
            if (gameOver || !gameRunning) return;

            const key = e.key;
            // Ngăn cuộn trang khi bấm mũi tên
            if (key.startsWith('Arrow')) {
                e.preventDefault();
            }

            // Chuyển hướng (chặn quay đầu ngay lập tức)
            const opposite = {
                'up': 'down', 'down': 'up', 'left': 'right', 'right': 'left'
            };
            let newDir = null;
            if (key === 'ArrowUp' || key === 'w' || key === 'W') newDir = 'up';
            else if (key === 'ArrowDown' || key === 's' || key === 'S') newDir = 'down';
            else if (key === 'ArrowLeft' || key === 'a' || key === 'A') newDir = 'left';
            else if (key === 'ArrowRight' || key === 'd' || key === 'D') newDir = 'right';
            else return;

            // Không cho quay đầu ngược với hướng hiện tại
            if (opposite[newDir] !== direction) {
                nextDirection = newDir;
            }
        }

        // ----- SỰ KIỆN & KHỞI CHẠY -----
        window.addEventListener('keydown', handleKeydown);

        document.getElementById('restartBtn').addEventListener('click', resetGame);

        // Lần đầu khởi tạo
        initGame();
        drawBoard();
        startGameLoop();

        // Khi thoát trang hoặc reload, clear interval (tốt)
        window.addEventListener('beforeunload', function() {
            if (gameInterval) clearInterval(gameInterval);
        });

        // Focus vào window để bắt phím (đảm bảo)
        window.focus();
    })();
</script>
</body>
</html>
